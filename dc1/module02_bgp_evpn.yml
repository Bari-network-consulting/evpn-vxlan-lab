---
- name: "DC1 — Module 2: BGP EVPN Overlay"
  hosts: dc1_fabric
  gather_facts: false
  serial: 0

  tasks:
    - name: "{{ hostname }} — Configure BGP AS and router-id"
      cisco.nxos.nxos_config:
        lines:
          - "router-id {{ bgp_router_id }}"
          - "log-neighbor-changes"
        parents: "router bgp {{ bgp_as }}"

    - name: "{{ hostname }} — Configure BGP RR neighbors (spine)"
      cisco.nxos.nxos_config:
        lines:
          - "remote-as {{ bgp_as }}"
          - "description {{ item.description }}"
          - "update-source loopback0"
          - "address-family l2vpn evpn"
          - "  send-community extended"
          - "  route-reflector-client"
        parents:
          - "router bgp {{ bgp_as }}"
          - "neighbor {{ item.ip }}"
      loop: "{{ bgp_neighbors }}"
      loop_control:
        label: "neighbor {{ item.ip }}"
      when: role == 'spine'

    - name: "{{ hostname }} — Retain all route-targets (spine)"
      cisco.nxos.nxos_config:
        lines:
          - "retain route-target all"
        parents:
          - "router bgp {{ bgp_as }}"
          - "address-family l2vpn evpn"
      when: role == 'spine'

    - name: "{{ hostname }} — Configure BGP neighbors to RR (leaf)"
      cisco.nxos.nxos_config:
        lines:
          - "remote-as {{ bgp_as }}"
          - "description {{ item.description }}"
          - "update-source loopback0"
          - "address-family l2vpn evpn"
          - "  send-community extended"
        parents:
          - "router bgp {{ bgp_as }}"
          - "neighbor {{ item.ip }}"
      loop: "{{ route_reflectors }}"
      loop_control:
        label: "neighbor {{ item.ip }}"
      when: role in ['leaf', 'border_leaf']

- name: "DC1 — Module 2: Verify BGP EVPN"
  hosts: dc1_fabric
  gather_facts: false

  tasks:
    - name: "{{ hostname }} — Wait for BGP sessions"
      cisco.nxos.nxos_command:
        commands:
          - "show bgp l2vpn evpn summary"
        wait_for:
          - "result[0] contains 'Established'"
        interval: 5
        retries: 12
      register: bgp_check
      ignore_errors: true

    - name: "{{ hostname }} — BGP status"
      debug:
        msg: "BGP EVPN: {{ 'sessions Established ✓' if 'Established' in bgp_check.stdout[0] else 'NOT Established ✗' }}"

    - name: "Save configuration"
      cisco.nxos.nxos_config:
        save_when: always
