---
# =============================================================================
# roles/border_leaf/tasks/main.yml
# Module 7: Border leaf sub-interfaces and eBGP per VRF toward R-ISP
# Only runs on LEAF-05
# =============================================================================

- name: "{{ hostname }} — Skip border leaf config"
  meta: end_host
  when: role != 'border_leaf'

# ── Enable parent interface in L3 mode ───────────────────────────────────────
- name: "{{ hostname }} — Set parent interface to L3 mode"
  cisco.nxos.nxos_config:
    lines:
      - "no switchport"
      - "no shutdown"
    parents: "interface {{ item.name }}"
  loop: "{{ border_interfaces }}"
  loop_control:
    label: "{{ item.name }}"

# ── Sub-interfaces per tenant ─────────────────────────────────────────────────
- name: "{{ hostname }} — Configure sub-interfaces"
  cisco.nxos.nxos_config:
    lines:
      - "description {{ item.1.description }}"
      - "encapsulation dot1q {{ item.1.dot1q }}"
      - "vrf member {{ item.1.vrf }}"
      - "ip address {{ item.1.ip }}"
      - "no shutdown"
    parents: "interface {{ item.1.id }}"
  loop: "{{ border_interfaces | subelements('subifs') }}"
  loop_control:
    label: "{{ item.1.id }} — {{ item.1.vrf }} — {{ item.1.ip }}"

# ── eBGP neighbors per VRF ────────────────────────────────────────────────────
- name: "{{ hostname }} — Configure eBGP per VRF"
  cisco.nxos.nxos_config:
    lines:
      - "address-family ipv4 unicast"
      - "  redistribute direct route-map PERMIT-ALL"
      - "  no export-gateway-ip"
    parents:
      - "router bgp {{ bgp_as }}"
      - "vrf {{ item.1.vrf }}"
  loop: "{{ border_interfaces | subelements('subifs') }}"
  loop_control:
    label: "BGP VRF {{ item.1.vrf }}"

- name: "{{ hostname }} — Configure eBGP neighbors per VRF"
  cisco.nxos.nxos_config:
    lines:
      - "remote-as {{ item.1.ebgp_remote_as }}"
      - "description R-ISP_{{ item.1.vrf }}"
      - "address-family ipv4 unicast"
      - "  send-community extended"
      - "  soft-reconfiguration inbound"
    parents:
      - "router bgp {{ bgp_as }}"
      - "vrf {{ item.1.vrf }}"
      - "neighbor {{ item.1.ebgp_neighbor }}"
  loop: "{{ border_interfaces | subelements('subifs') }}"
  loop_control:
    label: "neighbor {{ item.1.ebgp_neighbor }} VRF {{ item.1.vrf }}"

# ── Verify eBGP sessions ──────────────────────────────────────────────────────
- name: "{{ hostname }} — Verify eBGP sessions"
  cisco.nxos.nxos_command:
    commands:
      - "show bgp vrf {{ item.1.vrf }} sessions"
    wait_for:
      - "result[0] contains 'Established'"
    interval: 5
    retries: 12
  loop: "{{ border_interfaces | subelements('subifs') }}"
  loop_control:
    label: "BGP VRF {{ item.1.vrf }}"
  register: bgp_sessions
  ignore_errors: true

- name: "{{ hostname }} — BGP session status"
  debug:
    msg: "VRF {{ item.1.vrf }}: {{ 'Established' if 'Established' in bgp_sessions.results[index].stdout[0] else 'NOT Established — check R-ISP' }}"
  loop: "{{ border_interfaces | subelements('subifs') }}"
  loop_control:
    label: "{{ item.1.vrf }}"
    index_var: index
  when: bgp_sessions is defined
